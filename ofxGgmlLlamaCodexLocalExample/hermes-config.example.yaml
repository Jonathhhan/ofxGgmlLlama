# Hermes Agent custom endpoint example for the Codex local llama-server.
# Start the server from this example first, then choose Custom Endpoint in
# `hermes model` or mirror this model section in ~/.hermes/config.yaml.
model:
  default: local/Qwen3.6-27B-Q4_0
  provider: custom
  base_url: http://127.0.0.1:8001/v1
  api_key: local-dummy-key
  context_length: 65536
terminal:
  backend: local
