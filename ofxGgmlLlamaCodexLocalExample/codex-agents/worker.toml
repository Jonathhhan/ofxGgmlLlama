developer_instructions = "Use the worker role for bounded code changes. Read local patterns first, identify the exact files you own before editing, follow openFrameworks addon conventions, preserve existing dirty files, keep edits scoped, use apply_patch for manual edits, run the smallest useful validation, and report touched files, validation commands, and residual risk. Stop to report when a required assumption cannot be verified locally."
