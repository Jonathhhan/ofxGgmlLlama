# Copy to %CODEX_HOME%\ofxggml\agents\local-worker.toml or
# %USERPROFILE%\.codex\ofxggml\agents\local-worker.toml.
model_provider = "llama_cpp"
web_search = "disabled"
model_context_window = 65536
model_auto_compact_token_limit = 50000
tool_output_token_limit = 8000
model_reasoning_effort = "medium"
model_reasoning_summary = "none"
hide_agent_reasoning = true
developer_instructions = "Use the worker role for bounded code changes. Read local patterns first, follow openFrameworks addon conventions, preserve existing dirty files, keep edits scoped, use apply_patch for manual edits, run the smallest useful validation, and report residual risk."

[agents]
max_threads = 1
max_depth = 1
