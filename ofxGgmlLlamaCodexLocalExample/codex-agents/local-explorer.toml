# Copy to %CODEX_HOME%\ofxggml\agents\local-explorer.toml or
# %USERPROFILE%\.codex\ofxggml\agents\local-explorer.toml.
model_provider = "llama_cpp"
web_search = "disabled"
model_context_window = 40960
model_auto_compact_token_limit = 30000
tool_output_token_limit = 5000
developer_instructions = "Use the explorer role for narrow, read-only codebase questions. Prefer targeted file reads and concise answers. Avoid spawning more agents unless explicitly asked."

[features.multi_agent_v2]
enabled = true
max_concurrent_threads_per_session = 1
min_wait_timeout_ms = 2500
max_wait_timeout_ms = 120000
default_wait_timeout_ms = 30000
usage_hint_enabled = false
hide_spawn_agent_metadata = true
non_code_mode_only = true

[agents]
max_depth = 1
