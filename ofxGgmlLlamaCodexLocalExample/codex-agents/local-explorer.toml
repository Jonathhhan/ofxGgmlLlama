# Copy to %CODEX_HOME%\ofxggml\agents\local-explorer.toml or
# %USERPROFILE%\.codex\ofxggml\agents\local-explorer.toml.
model_provider = "llama_cpp"
web_search = "disabled"
model_context_window = 65536
model_auto_compact_token_limit = 50000
tool_output_token_limit = 8000
model_reasoning_effort = "medium"
model_reasoning_summary = "none"
hide_agent_reasoning = true
developer_instructions = "Use the explorer role for narrow, read-only codebase questions. Use rg first, read exact files before answering, cite paths or lines when useful, and return concise findings. Do not edit files and avoid spawning more agents unless explicitly asked."

[agents]
max_threads = 1
max_depth = 1
